name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build release package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate manifest version
        run: |
          node <<'NODE'
          const fs = require('fs');
          const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
          const tag = process.env.GITHUB_REF_NAME.replace(/^v/, '');

          if (manifest.version !== tag) {
            console.error(`Tag v${tag} does not match manifest.json version ${manifest.version}`);
            process.exit(1);
          }
          NODE

      - name: Package theme
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p "dist/Roveliese"
          cp manifest.json theme.css LICENSE README.md "dist/Roveliese/"
          cd dist
          zip -r "Roveliese-${version}.zip" Roveliese

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            "dist/Roveliese-${version}.zip" \
            --title "Roveliese ${version}" \
            --notes "Extract Roveliese-${version}.zip into your vault themes folder, then select Roveliese in Settings > Appearance > Themes." \
            --verify-tag
